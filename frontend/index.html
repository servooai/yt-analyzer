<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل يوتيوب بالذكاء الاصطناعي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF0000;
            --primary-dark: #CC0000;
            --bg-dark: #0F0F0F;
            --bg-card: #1A1A1A;
            --text-white: #FFFFFF;
            --text-gray: #AAAAAA;
            --border: #333333;
            --success: #00C853;
            --error: #FF5252;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            direction: rtl;
        }

        .header {
            background: linear-gradient(135deg, #1A1A1A 0%, #2D2D2D 100%);
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .input-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 1;
            min-width: 300px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-field::placeholder {
            color: var(--text-gray);
        }

        .btn {
            padding: 16px 32px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .video-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .thumbnail {
            width: 280px;
            height: 157px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--bg-dark);
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .video-author {
            color: var(--text-gray);
            margin-bottom: 15px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
            transition: all 0.3s ease;
        }

        .tab:hover {
            border-color: var(--primary);
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .content-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .content-card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .transcript-box {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 14px;
            line-height: 2;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
        }

        .summary-text {
            line-height: 1.8;
            font-size: 16px;
        }

        .summary-text p {
            margin-bottom: 15px;
        }

        .hooks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .hook-card {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .hook-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .hook-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: var(--primary);
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .hook-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .hook-description {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .hook-template {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            direction: ltr;
            text-align: left;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-gray);
            font-size: 16px;
        }

        .error-message {
            display: none;
            background: rgba(255, 82, 82, 0.1);
            border: 2px solid var(--error);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-gray);
            border-top: 1px solid var(--border);
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .video-card {
                flex-direction: column;
            }

            .thumbnail {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }

            .input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">🎬</div>
            <h1>محلل يوتيوب بالذكاء الاصطناعي</h1>
        </div>
    </header>

    <main class="container">
        <section class="input-section">
            <div class="input-group">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="videoInput"
                        class="input-field"
                        placeholder="الصق رابط الفيديو هنا... مثال: https://youtube.com/watch?v=abc123"
                    >
                </div>
                <button id="analyzeBtn" class="btn" onclick="analyzeVideo()">
                    <span>🔍</span>
                    <span>تحليل الفيديو</span>
                </button>
            </div>
        </section>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p class="loading-text">جاري تحليل الفيديو...</p>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <section id="results" class="results-section">
            <div class="video-card">
                <img id="videoThumbnail" class="thumbnail" src="" alt="Thumbnail">
                <div class="video-info">
                    <h2 id="videoTitle" class="video-title">-</h2>
                    <p id="videoAuthor" class="video-author">-</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="transcript" onclick="switchTab('transcript')">
                    📝 الترجمة
                </button>
                <button class="tab" data-tab="summary" onclick="switchTab('summary')">
                    📋 ملخص
                </button>
                <button class="tab" data-tab="hooks" onclick="switchTab('hooks')">
                    🎯 اقتراحات الهوك
                </button>
            </div>

            <div id="transcriptTab" class="tab-content">
                <div class="content-card">
                    <h3>📝 الترجمة الكاملة</h3>
                    <div id="transcriptContent" class="transcript-box"></div>
                </div>
            </div>

            <div id="summaryTab" class="tab-content" style="display: none;">
                <div class="content-card">
                    <h3>📋 ملخص المحتوى</h3>
                    <div id="summaryContent" class="summary-text"></div>
                </div>
            </div>

            <div id="hooksTab" class="tab-content" style="display: none;">
                <div class="content-card">
                    <h3>🎯 اقتراحات الهوك للفيديو</h3>
                    <div id="hooksContent" class="hooks-grid"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>صُنع بـ ❤️ لصناع المحتوى العرب</p>
    </footer>

    <script>
        // ⚙️ رابط الـ Backend - غيّره لرابطك على Render
        const BACKEND_URL = 'https://youtube-ai-analyzer-2559.onrender.com';

        function extractVideoId(url) {
            const patterns = [
                /(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
            document.getElementById('analyzeBtn').disabled = show;
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = message;
            errorEl.classList.add('active');
            setTimeout(() => errorEl.classList.remove('active'), 5000);
        }

        function showResults() {
            document.getElementById('results').classList.add('active');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabName + 'Tab').style.display = 'block';
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
        }

        async function analyzeVideo() {
            const videoInput = document.getElementById('videoInput').value.trim();

            if (!videoInput) {
                showError('⚠️ من فضلك ادخل رابط الفيديو أولاً');
                return;
            }

            const videoId = extractVideoId(videoInput);

            if (!videoId) {
                showError('⚠️ الرابط غير صالح. تأكد من رابط يوتيوب صحيح');
                return;
            }

            showLoading(true);
            document.getElementById('errorMsg').classList.remove('active');

            try {
                // جلب معلومات الفيديو
                const infoResponse = await fetch(`${BACKEND_URL}/video-info?video_id=${videoId}`);

                if (infoResponse.ok) {
                    const infoData = await infoResponse.json();
                    if (infoData.success) {
                        document.getElementById('videoThumbnail').src = infoData.thumbnail || `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                        document.getElementById('videoTitle').textContent = infoData.title || '-';
                        document.getElementById('videoAuthor').textContent = infoData.author || '-';
                    }
                }

                // جلب الترجمة
                const transcriptResponse = await fetch(`${BACKEND_URL}/transcript?video_id=${videoId}`);

                if (!transcriptResponse.ok) {
                    const errorData = await transcriptResponse.json();
                    throw new Error(errorData.error || 'فشل في جلب الترجمة');
                }

                const transcriptData = await transcriptResponse.json();

                if (!transcriptData.success) {
                    throw new Error(transcriptData.error || 'حدث خطأ غير متوقع');
                }

                document.getElementById('transcriptContent').textContent = transcriptData.transcript;
                document.getElementById('summaryContent').innerHTML = generateMockSummary(transcriptData.transcript);
                document.getElementById('hooksContent').innerHTML = generateMockHooks();

                showResults();

            } catch (error) {
                console.error('Error:', error);
                showError(`❌ ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        function generateMockSummary(transcript) {
            const lines = transcript.split('\n');
            return `
                <p>📌 <strong>عدد السطور:</strong> ${lines.length} سطر</p>
                <p>🎯 <strong>المحتوى:</strong> فيديو يحتوي على ${lines.length} سطر من النص</p>
                <p style="color: var(--text-gray); font-size: 14px; margin-top: 20px;">
                    💡 للملخص الذكي، اربط التطبيق بـ OpenAI API
                </p>
            `;
        }

        function generateMockHooks() {
            return `
                <div class="hook-card">
                    <div class="hook-number">1</div>
                    <h4 class="hook-title">🎬 سؤال مثير</h4>
                    <p class="hook-description">اسأل سؤال يجعلك تتوقف وتفكر</p>
                    <div class="hook-template">"هل تعلم أن...؟"</div>
                </div>
                <div class="hook-card">
                    <div class="hook-number">2</div>
                    <h4 class="hook-title">😱 كشف صادم</h4>
                    <p class="hook-description">شارك حقيقة مفاجئة</p>
                    <div class="hook-template">"80% من الناس لا يعرفون..."</div>
                </div>
                <div class="hook-card">
                    <div class="hook-number">3</div>
                    <h4 class="hook-title">🎯 وعد واضح</h4>
                    <p class="hook-description">أخبر المشاهد بالضبط ماذا سيتعلم</p>
                    <div class="hook-template">"في هذا الفيديو سأعلمك 3 طرق لـ..."</div>
                </div>
                <div class="hook-card">
                    <div class="hook-number">4</div>
                    <h4 class="hook-title">🤔 قصة شخصية</h4>
                    <p class="hook-description">شارك موقف شخصي يربط المشاهد</p>
                    <div class="hook-template">"عندما كنت في نفس موقفك..."</div>
                </div>
            `;
        }
    </script>
</body>
</html>
